services:
  scanner:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: arbscanner
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - arbscanner_data:/app/data
      - arbscanner_db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # Optional one-shot service for running the market matcher.
  # Usage: docker compose run --rm scanner-match
  #
  # scanner-match:
  #   build:
  #     context: .
  #     dockerfile: ./Dockerfile
  #   container_name: arbscanner-match
  #   command: ["arbscanner", "match"]
  #   env_file:
  #     - .env
  #   volumes:
  #     - arbscanner_data:/app/data
  #     - arbscanner_db:/app/db
  #   restart: "no"

volumes:
  arbscanner_data:
  arbscanner_db:
